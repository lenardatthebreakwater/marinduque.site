name: Generate Blog Post

on:
  schedule:
    # Runs Mon, Wed, Fri at 8:00 AM UTC
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Needed to push generated files
      pull-requests: write # Needed to create pull requests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/generate-post.js

      - name: Commit to draft branch
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git checkout -b draft/new-post-${{ github.run_number }}
          git add content/ keywords.json
          git diff --cached --quiet || git commit -m "draft: new blog post [skip ci]"
          git push origin draft/new-post-${{ github.run_number }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: draft/new-post-${{ github.run_number }}
          base: main
          title: "📝 Review new post before publishing"
          body: |
            A new blog post has been generated and is ready for review.

            ## Before merging, please check:
            - [ ] All place names in Marinduque are accurate
            - [ ] No beaches, landmarks, or locations from other provinces
            - [ ] Facts and descriptions are correct
            - [ ] Title and description look good

            ## How to edit
            1. Click the **Files changed** tab above
            2. Click the ✏️ pencil icon on the MDX file
            3. Make your edits directly in the browser
            4. Click **Commit changes**

            ## When ready
            Click **Merge pull request** to publish the post live. 🌴