name: Generate Blog Post

on:
  schedule:
    # Runs Mon, Wed, Fri at 8:00 AM UTC
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to push generated files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/generate-post.js

      - name: Commit and push generated post
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add pages/blog/ keywords.json
          git diff --cached --quiet || git commit -m "feat(blog): auto-generate new SEO post [skip ci]"
          git push